<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2A1F4A"/>
      <stop offset="60%" stop-color="#191130"/>
      <stop offset="100%" stop-color="#0E0A1E"/>
    </radialGradient>
    <linearGradient id="pouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A66D6"/>
      <stop offset="55%" stop-color="#5A47B4"/>
      <stop offset="100%" stop-color="#3E2F8C"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E7BE6"/>
      <stop offset="100%" stop-color="#6A57C8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4D277"/>
      <stop offset="50%" stop-color="#E8B83E"/>
      <stop offset="100%" stop-color="#C9972B"/>
    </linearGradient>
    <radialGradient id="goldcoin" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FBE7A6"/>
      <stop offset="55%" stop-color="#E8B83E"/>
      <stop offset="100%" stop-color="#BD8C26"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- app tile background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- subtle sparkles (運気/星) -->
  <g fill="#FBE7A6" opacity="0.85">
    <path d="M232 250 l9 26 26 9 -26 9 -9 26 -9 -26 -26 -9 26 -9z"/>
    <path d="M812 300 l7 20 20 7 -20 7 -7 20 -7 -20 -20 -7 20 -7z" opacity="0.8"/>
    <path d="M800 760 l6 17 17 6 -17 6 -6 17 -6 -17 -17 -6 17 -6z" opacity="0.7"/>
    <circle cx="250" cy="720" r="5" opacity="0.7"/>
    <circle cx="790" cy="210" r="4" opacity="0.6"/>
  </g>

  <!-- hanging cord + knot (あげまき結び 簡略) -->
  <g fill="none" stroke="url(#gold)" stroke-linecap="round">
    <circle cx="512" cy="168" r="30" stroke-width="16"/>
    <path d="M512 198 C 470 232, 452 250, 452 270 M512 198 C 554 232, 572 250, 572 270" stroke-width="16"/>
    <path d="M452 270 C 472 300, 552 300, 572 270" stroke-width="16"/>
    <path d="M512 286 L512 330" stroke-width="18"/>
  </g>
  <!-- knot wrap -->
  <rect x="476" y="262" width="72" height="34" rx="14" fill="url(#gold)"/>

  <!-- omamori body -->
  <g filter="url(#soft)">
    <rect x="316" y="356" width="392" height="520" rx="58" fill="url(#pouch)" stroke="url(#gold)" stroke-width="10"/>
    <!-- top folded flap -->
    <rect x="296" y="330" width="432" height="92" rx="34" fill="url(#flap)" stroke="url(#gold)" stroke-width="10"/>
    <!-- inner gold hairline -->
    <rect x="336" y="376" width="352" height="480" rx="44" fill="none" stroke="#F4D277" stroke-width="3" opacity="0.55"/>
  </g>

  <!-- 麻の葉風の控えめな模様（点） -->
  <g fill="#FFFFFF" opacity="0.06">
    <circle cx="400" cy="470" r="6"/><circle cx="512" cy="450" r="6"/><circle cx="624" cy="470" r="6"/>
    <circle cx="400" cy="800" r="6"/><circle cx="512" cy="820" r="6"/><circle cx="624" cy="800" r="6"/>
  </g>

  <!-- 守 emblem -->
  <circle cx="512" cy="616" r="126" fill="url(#goldcoin)" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3"/>
  <circle cx="512" cy="616" r="126" fill="none" stroke="#A9781F" stroke-width="4" opacity="0.5"/>
  <text x="512" y="616" text-anchor="middle" dominant-baseline="central"
        font-family="IPAGothic, 'IPA Pゴシック', sans-serif" font-size="168" font-weight="700"
        fill="#3A2C72">守</text>
</svg>
