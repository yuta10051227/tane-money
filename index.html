const NEWS=[{id:"n25",e:"🤝",t:"サポートなかま 登場！お手伝いで仲間が増える",b:"今週のお手伝いを3回するたびに「サポートなかま」が1体仲間に（最大3体）。⚔アタッカー（毎ターン敵に追撃）・💚ヒーラー（毎ターンHP回復）・🎲きまぐれ（攻撃か回復をランダム）の3タイプから、その週はランダムで決まるよ。モンスターのレベルが低くても、お手伝いをがんばればバトルを手伝ってくれる＝小さい子も活躍できる！毎週月曜にリセット。"},{id:"n24",e:"⚡",t:"素早さ＆ヤミノタマゴ強化が登場！",b:"モンスターに「素早さ(⚡)」ステータスが加わったよ。バトルは素早い方が先に攻撃できる＝先制の有利不利が生まれる！相手選びの画面に「先制できる/敵が先制」も表示。さらに、ヤミノオウを倒して🥚ヤミノタマゴを手に入れるたびに、基礎ステータスが永続+1%アップ（倒すほど強くなる）。みんなの基礎ステータスも少し底上げしたよ。"},{id:"n23",e:"⚔",t:"モンスター固有のレア武器＆ドロップ図鑑！",b:"モンスターを倒すと、それぞれ固有のレア武器を低確率でドロップするようになったよ（スライムソード〜ヤミノツルギ）。『記録』タブの「ドロップ図鑑」で、どのモンスターが何を落とすか・集めたかを確認できる。周回してコンプを目指そう！さらにバトルのHPは1分で1回復するようになったよ。"},{id:"n22",e:"💰",t:"投資の「配当」がもらえるように！",b:"株を持っていると、毎週ちょっとずつ「配当」がもらえるよ。本物の株とおなじで、配当はそんなに大きくない＆株価が下がれば トータルでは損することもある＝「持てば必ず増える」わけじゃないんだ。だからこそ、すぐ売らずコツコツ長く＆いろんな株に分けて持つのがコツだよ。"},{id:"n21",e:"🥚",t:"ヤミノオウのタマゴ 登場！",b:"バトルで「ヤミノオウ」を倒すと、まれに🥚タマゴをドロップ！「記録」タブからお世話すると、たまご→幼年期1→幼年期2→成長期→成熟期→完全体→究極体（じぶんだけの👑ヤミノオウ）と進化するよ。段階が上がるたびに しんか演出！育てきると「ひみつのなかま」で すがたにできる。毎日コツコツお世話するのがポイント！"},{id:"n20",e:"✨",t:"こまかい使いやすさ改善！",b:"・ガチャの近くに「きょうのお手伝い数」を表示＝先にお手伝いするとタネがもっと元気に🌱 ・暗い画面の文字を見やすく（コントラスト改善）・記録の「取り消し」はまちがい防止で2タップ確認に・プレミア装備は一度 解放したら、貯金を使っても外れません・バトルのかけら計算など こまかいバグを修正しました。"},{id:"n19",e:"💎",t:"プレミア装備が貯金で手に入る！",b:"これまで「近日登場」だったプレミア装備が、貯金や目標達成で解放できるようになったよ！「⚡いかずちの剣」=貯金500pt、「🐉りゅうおうの剣」=目標3回達成、「💎ダイヤのよろい」=貯金1000pt、「🌈にじのオーラ」=目標5回達成。コツコツ貯めるほど 最強そうびに近づくよ。あと、毎日ミッションの「ガチャ」が「まめちしき」に変わって、お金の勉強でEXPがもらえるようになりました。"},{id:"n18",e:"📈",t:"投資が やさしくなった！",b:"株の手数料を10%→2%、為替を往復4%→1%に下げました。配当は毎週ちょっとずつ（控えめ）。株価が下がれば損することもある＝「持てば必ず増える」わけじゃない、本物の投資の考え方を体験できるよ。短期で売り買いすると手数料で損しやすいので、コツコツ長く＆分けて持つのがコツ。損益は『今売ったら戻るpt』で正直に表示。"},{id:"n17",e:"🆙",t:"レベルのバランス調整",b:"お手伝いのEXPは「同じタスクを連打すると だんだん減る・1日の上限あり」に調整しました。いろんなお手伝いを1回ずつやるのが いちばん効率よくレベルUP！"},{id:"n16",e:"⭐",t:"装備にレア度＆プレミア登場！",b:"そうびに レア度（N〜UR）がついたよ。強さとレア度は別！さらに「⚡いかずちの剣」「🐉りゅうおうの剣」「💎ダイヤのよろい」「🌈にじのオーラ」など プレミア装備が図鑑に追加（近日 手に入るように！）。あと、お手伝いでもらえるEXPが ポイント×1.5に！クリアするほど どんどんレベルUP。"},{id:"n15",e:"🎒",t:"そうびが2スロット＆図鑑に！",b:"「⚔ぶき」と「🛡たて」を2つ同時に装備できるように！そうびは図鑑になって、お手伝い・連続・バトル、そして“まれにドロップ”でも集まるよ。バトルで勝つと たまに💊回復アイテムや そうびが見つかる！HPはポイントでも回復できる。"},{id:"n14",e:"🗺",t:"旅先がえらべるように！",b:"とっくんの旅は「近くの森・海辺・山・遺跡・天空の島・まおうの城」から選べるよ。遠い旅先ほど 時間はかかるけどEXPがたくさん！レベルが上がると新しい旅先が解放。バトルも、強い敵ほど もらえるEXPが多い（選ぶ画面に表示）。"},{id:"n13",e:"🧭",t:"とっくんの旅 登場！",b:"ホームの「🧭とっくんの旅」からモンスターを旅に出すと、時間が経つとEXP（ときどき🧩かけらも）がもらえるよ。放置でコツコツ育てよう！"},{id:"n12",e:"🎯",t:"きょうのミッション登場！",b:"毎日の「お手伝い3回・なでなで・ガチャ・バトル1勝」をクリアでEXP！ぜんぶ達成すると🧩チケットのかけらももらえるよ。ホーム上部に出ます。"},{id:"n11",e:"🎒",t:"そうび（アイテム）登場！",b:"バトル画面の「🎒そうび」から、ぼうし・たて・つるぎ などを装備してステータスUP！レベル・お手伝い・なでなで・連続・バトル勝利など、いろんな がんばりで新しいそうびが解放されるよ。"},{id:"n10",e:"🧩",t:"バトル報酬が「チケットのかけら」に",b:"バトルに勝つと「ガチャチケットのかけら」がもらえるよ。5枚あつめると🎟ガチャチケット1枚に！同じモンスターからは1日1かけらまで（でもEXPは毎回もらえる）。いろんな相手と戦って集めよう！"},{id:"n09",e:"🆙",t:"モンスターに レベル登場！",b:"お手伝い・なでなで・バトル勝利で EXP が貯まって レベルアップ！レベルが上がると HP・こうげき・ぼうぎょ が強くなるよ。個体値(才能)が高い子ほど ぐんぐん伸びる！"},{id:"n08",e:"⚔",t:"モンスターバトル＆ボス登場！",b:"育てたモンスターで野生モンスターとバトル！「⚔モンスターバトル」ボタンから。3ターン勝負で、勝つと🎟ガチャチケットがもらえてガチャをもう1回引けるよ。ヌシ・ドラゴに勝つと秘密のボスも出現！"},{id:"n07",e:"❤",t:"バトルはHPを持ち越し",b:"バトルで減ったHPは、お手伝い・なでなで で回復するよ。つかれてると戦えないので、お世話してあげよう（あさになると元気に！）。"},{id:"n06",e:"💩",t:"怠けもんに気をつけて",b:"24時間 なでなでも タスクもしないと、モンスターが一時的に「怠けもん」に変身…！なでなでか タスク1つで すぐ元に戻るよ（進化や 育てた度は 消えません）。毎日 かまってあげてね。"},{id:"n05",e:"🐾",t:"ひみつのなかま 8体追加",b:"記録タブの「ひみつのなかま」に、コインリス・ブタコ・まねきネコ など8体を追加。たくさんクリアすると解放され、タップで“すがた”を変えられるよ。"},{id:"n04",e:"🎨",t:"アプリのアイコンがドット絵に",b:"ホームの統計や見出しのアイコンを、オリジナルのドット絵に変更中。メンバー編集から“ドット絵アバター”も選べます。"},{id:"n03",e:"📅",t:"おてつだいが 平日/休日タブに",b:"毎日のおてつだいを、平日／休日のタブで切り替えられるようになりました。今日に合うタブが自動で開きます。"},{id:"n02",e:"🎰",t:"ガチャに確定演出＆新シリーズ",b:"SR以上で水やりの瞬間に流れ星・オーロラなどの予兆演出が出るように。図鑑に「世界のお金」シリーズも追加！"},{id:"n01",e:"🖼",t:"背景きせかえ追加",b:"累計クリアで、海・夕焼け・夜空・宇宙・オーロラ・桜・森 などの背景が解放されます。"}];// デイリーミッション(毎日リセット)。クリアでEXP、全クリアで🧩かけら

emoji:"⚖",title:"欲しいvs必要",body:"ものを買う前に「欲しいもの？必要なもの？」と考えよう。欲しいものは後回しにすると、本当に必要かわかるよ。",q:"買う前に 考えると いいことは？",o:["欲しい？ 必要？","だれが 見てる？","何色 かな？"],a:0},{id:"t12",cat:"貯金・節約",emoji:"🔄",title:"複利の魔法",body:"利子にさらに利子がつく「複利」はとても強力。100ptを年5%で運用すると20年後には約265ptになるよ！",q:"利子に さらに 利子が つくことを なんという？",o:["単利","複利","金利ゼロ"],a:1},{id:"t13",cat:"投資",emoji:"📈",title:"株ってなに？",body:"株は会社の「一部オーナー権」。会社が成長すると株価が上がり、持っているだけで「配当金」ももらえることがあるよ。",q:"株を もつと どうなる？",o:["会社の 一部オーナーに なる","すぐ 社長に なる","タダで 商品が もらえる"],a:0},{id:"t14",cat:"投資",emoji:"🎲",title:"リスクとリターン",body:"大きく儲かるものほどリスクも大きい。株より預金は安全だけど増えにくい。自分のリスク許容度を知ることが大切。",q:"大きく もうかる ものは ふつう？",o:["リスクも 大きい","ぜったい 安全","必ず 儲かる"],a:0},{id:"t15",cat:"投資",emoji:"🧺",title:"卵は1つのカゴに盛るな",body:"投資の有名な格言。1つの銘柄だけに全部つぎ込むのは危険。複数に分けて投資することを「分散投資」というよ。",q:"「卵は1つの カゴに もるな」の 意味は？",o:["1つに 全部 入れない","卵を 大切に する","カゴを たくさん 買う"],a:0},{id:"t16",cat:"投資",emoji:"⏳",title:"長期投資が強い理由",body:"短期の株価は予測できないが、長期的に見ると良い会社の株は成長する傾向がある。焦らずじっくり持つのが基本。",q:"投資の 基本的な 持ち方は？",o:["すぐ 売る","じっくり 長く 持つ","毎日 売り買い する"],a:1},{id:"t17",cat:"投資",emoji:"🤔",title:"なぜ企業は株を発行するの？",body:"会社は成長するためのお金が必要。株を売ってお金を集める代わりに、投資家に利益を分けることを約束するよ。",q:"会社が 株を 売る 理由は？",o:["成長の お金を 集めるため","あそぶ ため","税金の ため"],a:0},{id:"t18",cat:"投資",emoji:"📉",title:"株が下がるのはなぜ？",body:"業績悪化・経済不安・金利上昇・戦争などが原因。みんなが「将来不安だ」と思うと株を売るので価格が下がるよ。",q:"みんなが 将来 不安だと 思うと 株は？",o:["上がる","下がる","変わらない"],a:1},{id:"t19",cat:"社会・経済",emoji:"🌍",title:"世界の経済はつながっている",body:"アメリカで不景気が起きると日本の株も下がる。世界の経済はインターネット同様つながっているんだよ。",q:"アメリカの 不景気は 日本の株に？",o:["関係 ない","えいきょう する","良く する"],a:1},{id:"t20",cat:"社会・経済",emoji:"🏭",title:"モノの値段が決まる仕組み",body:"「需要（欲しい人）」と「供給（売りたい量）」のバランスで価格が決まる。欲しい人が多いほど高くなるよ。",q:"ものの ねだんは 何で 決まる？",o:["需要と 供給","じゃんけん","お店の 気分"],a:0},{id:"t21",cat:"社会・経済",emoji:"🤖",title:"AIと仕事の未来",body:"AIの発展で一部の仕事はなくなる。でも新しい仕事も生まれる。大切なのは「考える力」と「学び続ける力」だよ。",q:"AI時代に 大切なのは？",o:["考える力・学び続ける力","何も しない こと","暗記 だけ"],a:0},{id:"t22",cat:"社会・経済",emoji:"♻",title:"ESG投資ってなに？",body:"環境(E)・社会(S)・企業統治(G)に配慮した企業に投資すること。地球にいい企業を応援しながら増やせるよ。",q:"ESG投資が 大切に するのは？",o:["環境や 社会","スピード だけ","見た目 だけ"],a:0},{id:"t23",cat:"社会・経済",emoji:"📱",title:"デジタルマネーの時代",body:"PayPayやクレカで現金を使わない人が増えている。便利な反面、使いすぎに気づきにくいので注意が必要だよ。",q:"キャッシュレスの 注意点は？",o:["使いすぎに 気づきにくい","重くて 持てない","すぐ さびる"],a:0},{id:"t24",cat:"働くこと",emoji:"💼",title:"給料ってどう決まる？",body:"スキル・経験・業界・会社の規模などで変わる。同じ仕事でも会社によって全然違うことも。副業も増えているよ。",q:"給料は 同じ仕事でも？",o:["会社で ちがう","ぜんぶ 同じ","くじで 決まる"],a:0},{id:"t25",cat:"働くこと",emoji:"🌱",title:"お手伝いは社会の練習",body:"お手伝いは実はすごく大事。責任感・計画性・達成感を学べる。これが将来の仕事への基礎になるよ！",q:"お手伝いで 学べる ことは？",o:["責任感や 計画性","運の よさ だけ","なにも ない"],a:0},{id:"t26",cat:"働くこと",emoji:"🤝",title:"価値を作るとお金になる",body:"人が「欲しい・助かる」と思うものを作ったり、サービスを提供したりすることで対価（お金）がもらえるよ。",q:"お金が もらえるのは どんな とき？",o:["人の 役に 立つものを 作る","ただ ねがう","じっと まつ"],a:0},{id:"t27",cat:"働くこと",emoji:"📚",title:"勉強がお金につながる理由",body:"知識・スキルは「人的資本」。勉強に使うお金は投資と同じ。学べば学ぶほど将来稼げる可能性が上がるよ。",q:"勉強は 何に つながる？",o:["将来 かせぐ 力","むだ づかい","ただの 運"],a:0},{id:"t28",cat:"Tane Money",emoji:"🌱",title:"Tane Moneyのコンセプト",body:"「お金は種」。種を蒔いて育てるように、小さなお手伝いの積み重ねが大きな力になる。毎日コツコツが一番！",q:"Tane Moneyの 考えは？",o:["お金は 種、コツコツ 育てる","一発 大もうけ","運 だめし"],a:0},{id:"t29",cat:"Tane Money",emoji:"🏆",title:"ランキングで成長できる理由",body:"家族でランキングを競うことで「やる気」が生まれる。競争ではなく「昨日の自分より成長する」ことが大切。",q:"ランキングで 大切なのは？",o:["昨日の 自分より 成長","1位 いがいは だめ","人を ばかに する"],a:0},{id:"t30",cat:"Tane Money",emoji:"🎰",title:"ガチャと上手につきあう",body:"ガチャは「確率」の体験。レアが出るかはランダムで、たくさん引いても必ず当たるわけじゃない。お金は計画的に使い、貯金やコツコツの積み重ねが一番たしかな力になるよ。",q:"ガチャと 上手に つきあうには？",o:["お金は 計画的に、コツコツが 一番","全部 つぎこむ","借金して 引く"],a:0},{id:"t31",cat:"投資",emoji:"🪙",title:"ドルコスト平均法",body:"毎月おなじ金額で 買い続けると、高い時は少なく・安い時は多く買えて、買う値段が ならされる。タイミングを当てなくていいから、初心者にやさしい王道のやり方だよ。",q:"ドルコスト平均法の よさは？",o:["高い時に少なく、安い時に多く 買える","必ず もうかる","一度に 全部 買う"],a:0},{id:"t32",cat:"投資",emoji:"🏛",title:"NISAってなに？",body:"ふつう 投資のもうけには 約20%の税金がかかる。でも「NISA」という国の制度を使うと、その税金が0になるんだ。長くコツコツ 積み立てる人ほどお得な、応援の仕組みだよ。",q:"NISAを 使うと？",o:["もうけの 税金が 0になる","お金が 2倍になる","買い物が 無料"],a:0},{id:"t33",cat:"社会・経済",emoji:"📊",title:"インフレとデフレ",body:"物の値段が だんだん上がるのが「インフレ」、下がるのが「デフレ」。インフレだと 同じ100円で買えるものが減る＝お金の価値が下がる。だから お金を ねかせず 育てる視点も大事。",q:"インフレとは？",o:["物の値段が 上がること","お金が増える 魔法","銀行の 名前"],a:0},{id:"t34",cat:"貯金・節約",emoji:"🆘",title:"もしもの備え",body:"急な出費（こわれた・病気など）に備えて、すぐ使わない「もしものお金」を 少し貯めておくと安心。投資の前に、まず この安心のお金を 用意するのが順番だよ。",q:"もしもの備えは？",o:["使わないお金を 少し貯めておく","全部 使う","借りれば いい"],a:0},{id:"t35",cat:"お金のきほん",emoji:"🤐",title:"お金の詐欺に注意",body:"「絶対もうかる」「あなただけ特別」はウソのサイン。うまい話には 裏がある。あやしいと思ったら お金を出す前に、かならず 大人に相談しようね。",q:"『絶対もうかる』と 言われたら？",o:["あやしい！大人に 相談","すぐ お金を 出す","ひみつに する"],a:0},{id:"t36",cat:"投資",emoji:"🧮",title:"複利でふえる例",body:"毎年5%ずつ増えると、10年で約1.6倍、20年で約2.6倍、30年で約4.3倍に。早く始めて 長く続けるほど、時間が味方してくれる。これが複利の力だよ。",q:"複利で 一番 大事なのは？",o:["長い 時間","一発の 大勝負","運だけ"],a:0},// ── 純増コンテンツ 第1弾（コンテンツ枯渇対策・48話へ）──
{id:"t37",cat:"投資",emoji:"📜",title:"72の法則",body:"「72 ÷ 年の利率」で、お金が2倍になるまでの年数がだいたい分かる。年6%なら72÷6=12年。早見できる便利な計算だよ。",q:"年6%だと お金が2倍に なるのは およそ？",o:["12年","2年","50年"],a:0},{id:"t38",cat:"投資",emoji:"🛟",title:"暴落はこわくない",body:"株が大きく下がる「暴落」は、長く投資する人にはむしろ安く買えるチャンス。みんなが売ってあわてる時こそ、コツコツ続ける人が強いよ。",q:"暴落のとき コツコツ投資の人は？",o:["あわてず 続ける","全部 売る","借金して 買う"],a:0},{id:"t39",cat:"お金のきほん",emoji:"📐",title:"金利ってなに？",body:"お金を借りたり預けたりするときの「レンタル料」が金利。借りると払う・預けるともらえる。低い金利で借り、高い利回りで増やすのが基本だよ。",q:"金利は お金の？",o:["レンタル料","重さ","色"],a:0},{id:"t40",cat:"貯金・節約",emoji:"🏠",title:"固定費と変動費",body:"毎月きまってかかるのが「固定費」（サブスク・家賃など）、月で変わるのが「変動費」（おやつ・遊び）。節約は まず固定費を見直すと効果が大きいよ。",q:"節約で 先に見直すと よいのは？",o:["固定費","変動費","おこづかい全部"],a:0},{id:"t41",cat:"社会・経済",emoji:"💱",title:"円安と円高",body:"1ドル=100円→150円になるのが「円安」、150円→100円が「円高」。円安だと輸入品が高く、海外旅行も高くつく。ニュースでよく出る言葉だよ。",q:"1ドル100円→150円は？",o:["円安","円高","金利"],a:0},{id:"t42",cat:"働くこと",emoji:"🚀",title:"会社をつくるってどんなこと？",body:"自分でサービスや商品を考えて売るのが「起業」。うまくいけば大きく稼げるけど、お客さんに価値を届けられるかが すべて。失敗から学ぶ力も大事だよ。",q:"起業で 一番 大切なのは？",o:["お客さんに 価値を届ける","運だけ","ねがうこと"],a:0},{id:"t43",cat:"投資",emoji:"🎁",title:"配当ってなに？",body:"会社がもうけの一部を、株を持つ人に分けてくれるのが「配当」。ただし会社の調子が悪いと減ったり止まったりする。「持てば必ずもらえる」わけではないよ。",q:"配当について 正しいのは？",o:["減ったり止まったり する","ぜったい もらえる","税金が 0になる"],a:0},{id:"t44",cat:"お金のきほん",emoji:"☂",title:"保険ってなに？",body:"みんなで少しずつお金を出し合い、だれかに「もしも」が起きた時に助ける仕組みが保険。大きな事故や病気の備え。かけすぎ・入りすぎにも注意だよ。",q:"保険は どんな しくみ？",o:["みんなで 出し合い 助け合う","必ず もうかる","税金の こと"],a:0},{id:"t45",cat:"貯金・節約",emoji:"🔁",title:"サブスクの見直し",body:"毎月じわじわ引かれるサブスクは、使っていないものを 1つ解約するだけで 年に数千円の節約に。「なんとなく続けている」を見つけよう。",q:"使ってない サブスクは？",o:["解約して 節約","ぜんぶ 続ける","気にしない"],a:0},{id:"t46",cat:"社会・経済",emoji:"🌐",title:"GDPってなに？",body:"その国で1年間に作られたモノ・サービスの合計が「GDP」。国の経済の元気さをはかるものさし。増えると景気が良い、減ると不景気の目安だよ。",q:"GDPは 何を はかる？",o:["国の経済の 元気さ","人口の 多さ","土地の 広さ"],a:0},{id:"t47",cat:"Tane Money",emoji:"💪",title:"失敗から学ぶ",body:"投資もお手伝いも、うまくいかない日がある。大事なのは「なぜ？」と考えて次に活かすこと。失敗は学びの種。タネマネーは何度でも挑戦できるよ。",q:"失敗したとき 大切なのは？",o:["なぜか考えて 次に活かす","あきらめる","かくす"],a:0},{id:"t48",cat:"投資",emoji:"🧰",title:"
