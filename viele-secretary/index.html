<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1115" />
    <title>VIELE secretary</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #0F1115; color: #E8EAED; font-family: system-ui, -apple-system, sans-serif; }
      #root:empty::after {
        content: "読み込み中…";
        display: grid;
        place-items: center;
        height: 100%;
        color: #9AA1AC;
        font-size: 14px;
      }
    </style>
    <script>
      // どんな読み込み/実行エラーも画面に出す（真っ白・無限ローディング防止）
      (function () {
        function show(msg) {
          var r = document.getElementById("root");
          if (!r) return;
          // innerHTML連結を避け、DOM生成＋textContentで安全に表示（XSS対策）
          r.textContent = "";
          var box = document.createElement("div");
          box.style.cssText = "padding:20px;font-family:system-ui,sans-serif";
          var h = document.createElement("h2");
          h.style.cssText = "color:#E2554B;font-size:16px";
          h.textContent = "読み込みの問題";
          var p = document.createElement("p");
          p.style.cssText = "color:#9AA1AC;font-size:13px";
          p.textContent = "下の内容をコピーして共有してください。";
          var pre = document.createElement("pre");
          pre.style.cssText = "white-space:pre-wrap;word-break:break-word;font-size:12px;background:#171A21;padding:12px;border-radius:8px";
          pre.textContent = String(msg);
          box.appendChild(h); box.appendChild(p); box.appendChild(pre);
          r.appendChild(box);
        }
        // 実行エラー・スクリプト読込失敗(capture)・Promise例外をすべて捕捉
        window.addEventListener("error", function (e) {
          show((e.error && e.error.stack) || e.message || ("リソース読込失敗: " + (e.target && e.target.src || e.target && e.target.href || e)));
        }, true);
        window.addEventListener("unhandledrejection", function (e) {
          show("UnhandledRejection: " + ((e.reason && e.reason.stack) || e.reason));
        });

        // 5秒たっても描画されない場合は状況を表示（無限ローディング防止）
        setTimeout(function () {
          var r = document.getElementById("root");
          if (r && r.childElementCount === 0) {
            show("アプリのJavaScriptが実行されていません。\n古いキャッシュ/Service Workerの可能性が高いです。\nSafariのプライベートタブで開くか、ページを数回リロードしてください。");
          }
        }, 5000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
